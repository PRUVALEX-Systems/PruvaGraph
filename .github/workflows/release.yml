name: Release — Publish to VS Code Marketplace + PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"       # stable:   v1.9.0
      - "v[0-9]+.[0-9]+.[0-9]+-rc*"   # pre-release: v1.9.0-rc1

permissions:
  contents: write   # GitHub Release creation

env:
  NODE_VERSION: "20.x"
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # PRE-FLIGHT — validate tag matches package.json + CHANGELOG
  # ──────────────────────────────────────────────────────────────────
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-rc"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Tag: $TAG | Version: $VERSION"

      - name: Verify CHANGELOG has entry for this version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "❌ No CHANGELOG.md entry found for [$VERSION]"
            echo "   Add an entry before tagging a release."
            exit 1
          fi
          echo "✅ CHANGELOG entry found for $VERSION"

      - name: Verify package.json version matches tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) != tag ($VERSION)"
            exit 1
          fi
          echo "✅ package.json version matches tag: $VERSION"

      - name: Verify pyproject.toml version matches tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PY_VERSION=$(grep '^version = ' python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$PY_VERSION" != "$VERSION" ]; then
            echo "❌ pyproject.toml version ($PY_VERSION) != tag ($VERSION)"
            exit 1
          fi
          echo "✅ pyproject.toml version matches tag: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
        working-directory: .

      - name: Install Python dev dependencies
        working-directory: python
        run: |
          pip install -e ".[dev]"

      - name: Full test gate (JS + Python)
        run: |
          node --check extension.js
          node test/test_extension_driftguard.js
          node test/test_dashboard_html.js
          cd python && python -m pytest tests/ --tb=short -q
        env:
          PYTHONUTF8: "1"

  # ──────────────────────────────────────────────────────────────────
  # PACKAGE — VSIX
  # ──────────────────────────────────────────────────────────────────
  package-vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      vsix-name: ${{ steps.package.outputs.vsix-name }}
      vsix-size-kb: ${{ steps.size.outputs.size-kb }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps + vsce
        run: |
          npm ci
          npm install -g @vscode/vsce

      - name: Package VSIX
        id: package
        run: |
          vsce package --no-git-tag-version --no-dependencies
          VSIX=$(ls *.vsix | head -1)
          echo "vsix-name=$VSIX" >> "$GITHUB_OUTPUT"
          echo "Packaged: $VSIX"

      - name: Size check (< 10MB)
        id: size
        run: |
          VSIX="${{ steps.package.outputs.vsix-name }}"
          SIZE_KB=$(du -k "$VSIX" | cut -f1)
          echo "size-kb=$SIZE_KB" >> "$GITHUB_OUTPUT"
          echo "VSIX: ${SIZE_KB}KB"
          [ "$SIZE_KB" -le 10240 ] || (echo "❌ Exceeds 10MB" && exit 1)
          echo "✅ Size OK"

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: pruvagraph-vsix-release
          path: "*.vsix"
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────
  # PACKAGE — Python wheel + sdist
  # ──────────────────────────────────────────────────────────────────
  package-python:
    name: Package Python Wheel + SDist
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build
        working-directory: python
        run: |
          pip install build
          python -m build
          ls -lh dist/

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: pruvagraph-python-dist
          path: python/dist/
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────
  # PUBLISH — VS Code Marketplace
  # ──────────────────────────────────────────────────────────────────
  publish-marketplace:
    name: Publish — VS Code Marketplace
    runs-on: ubuntu-latest
    needs: [package-vsix]
    # To add a manual approval gate: create a GitHub Environment named 'marketplace'
    # in Settings → Environments, then add: environment: marketplace
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: pruvagraph-vsix-release
          path: ./

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX=$(ls *.vsix | head -1)
          IS_PRE="${{ needs.validate.outputs.is_prerelease }}"
          if [ "$IS_PRE" = "true" ]; then
            echo "Publishing pre-release..."
            vsce publish --pre-release --pat "$VSCE_PAT" --packagePath "$VSIX"
          else
            echo "Publishing stable release..."
            vsce publish --pat "$VSCE_PAT" --packagePath "$VSIX"
          fi

  # ──────────────────────────────────────────────────────────────────
  # PUBLISH — PyPI
  # ──────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish — PyPI
    runs-on: ubuntu-latest
    needs: [package-python]
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: pruvagraph-python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/

  # ──────────────────────────────────────────────────────────────────
  # GITHUB RELEASE — after both publish jobs
  # ──────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [package-vsix, package-python, publish-marketplace, publish-pypi]
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: pruvagraph-vsix-release
          path: release-assets/

      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: pruvagraph-python-dist
          path: release-assets/

      - name: Extract CHANGELOG section
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          NOTES=$(awk "/## \[$VERSION\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          body: |
            ## PRUVALEX PruvaGraph ${{ github.ref_name }}

            ${{ steps.notes.outputs.notes }}

            ---
            **VSIX:** ${{ needs.package-vsix.outputs.vsix-size-kb }}KB

            ### Install
            ```bash
            # VS Code extension:
            code --install-extension pruvalex-pruvagraph-${{ needs.validate.outputs.version }}.vsix

            # Python CLI:
            pip install pruvagraph==${{ needs.validate.outputs.version }}
            ```
