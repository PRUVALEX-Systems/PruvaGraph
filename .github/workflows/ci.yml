name: CI — Quality Gate

# Triggers: every push to main/develop + every PR
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.x"
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # JOB 1 — JS: Lint + Type Check + Unit Tests + Coverage
  # ──────────────────────────────────────────────────────────────────
  js-tests:
    name: JS — Lint + Types + Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Lint — node --check all source files (zero errors gate)
        run: npm run lint

      - name: Type check — tsc --noEmit (zero errors gate)
        run: npm run typecheck

      - name: Run JS tests — DriftGuard wiring (8 tests)
        run: |
          echo "Running test/test_extension_driftguard.js..."
          node test/test_extension_driftguard.js
          echo "✅ DriftGuard JS tests passed"

      - name: Run JS tests — Dashboard HTML smoke (30 tests)
        run: |
          echo "Running test/test_dashboard_html.js..."
          node test/test_dashboard_html.js
          echo "✅ Dashboard HTML tests passed"

      - name: Run JS coverage — nyc (DriftGuard + Dashboard)
        run: |
          npx nyc --reporter=text --reporter=html --reporter=lcov node test/test_extension_driftguard.js
          npx nyc --reporter=text --reporter=html --reporter=lcov --no-clean node test/test_dashboard_html.js
          npx nyc report
          echo "✅ Coverage report generated"

      - name: Upload JS coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: coverage/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # JOB 2 — Python: Install + 460 tests
  # ──────────────────────────────────────────────────────────────────
  python-tests:
    name: Python — 460 Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: python/pyproject.toml

      - name: Install PruvaGraph + dev deps
        working-directory: python
        run: |
          pip install -e ".[dev]"

      - name: Run pytest (460 tests, 0 failures required)
        working-directory: python
        run: |
          python -m pytest tests/ --tb=short -q
        env:
          PYTHONUTF8: "1"

      - name: Run settings audit (5/5 required)
        working-directory: python
        run: |
          python -c "
          import json, sys
          pkg = json.load(open('../package.json'))
          props = pkg['contributes']['configuration']['properties']
          modules = ['contextlens','driftguard','ghostmemory','rulesforge','taskweaver']
          ok = True
          for m in modules:
              key = f'pruvagraph.modules.{m}.enabled'
              p = props.get(key, {})
              has_desc = bool(p.get('description','').strip())
              has_md   = bool(p.get('markdownDescription','').strip())
              if has_desc and has_md:
                  print(f'[OK] {key}')
              else:
                  print(f'[FAIL] {key}  description={has_desc}  markdownDescription={has_md}')
                  ok = False
          if not ok:
              sys.exit(1)
          print('RESULT: ALL OK')
          "

      - name: Run env-key regression guard
        working-directory: python
        run: |
          python -m pytest tests/test_module_gating.py::TestInstallerWiring::test_env_key_matches_server_reader -v
        env:
          PYTHONUTF8: "1"

      - name: README tools regression guard (23 = 23)
        working-directory: python
        run: |
          python ../scripts/check_readme_tools.py
        env:
          PYTHONUTF8: "1"

  # ──────────────────────────────────────────────────────────────────
  # JOB 3 — Benchmark sanity (tier_unknown must be 0%)
  # ──────────────────────────────────────────────────────────────────
  benchmark-sanity:
    name: Benchmark — tier_unknown = 0%
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: python/pyproject.toml

      - name: Install PruvaGraph
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Run benchmark suite (84 questions, backend=none)
        working-directory: python
        run: |
          python -m pruvagraph.cli .
          python -m pruvagraph.cli benchmark-suite \
            --root . \
            --output /tmp/ci_benchmark.jsonl
        env:
          PYTHONUTF8: "1"

      - name: Assert tier_unknown = 0
        run: |
          python - << 'EOF'
          import json

          lines = open('/tmp/ci_benchmark.jsonl').read().strip().split('\n')
          questions = [json.loads(l) for l in lines[1:] if l.strip()]
          unknown = [q for q in questions if q.get('method_used') == 'tier_unknown']
          total   = len(questions)

          print(f"Questions: {total}")
          print(f"tier_unknown: {len(unknown)} ({len(unknown)/max(total,1)*100:.1f}%)")

          if len(unknown) > 0:
              print(f"FAIL: {len(unknown)} questions still classified as tier_unknown")
              for q in unknown[:5]:
                  print(f"  - {q.get('question','?')[:60]}")
              exit(1)

          summary = json.loads(lines[0])
          savings = summary.get('avg_savings_pct', 0)
          print(f"Avg savings: {savings:.1f}%")
          if savings < 50:
              print(f"FAIL: avg savings {savings:.1f}% below 50% floor")
              exit(1)
          print("✅ Benchmark sanity checks passed")
          EOF

  # ──────────────────────────────────────────────────────────────────
  # JOB 4 — VSIX package + size check
  # ──────────────────────────────────────────────────────────────────
  vsix-check:
    name: VSIX — Package + Size
    runs-on: ubuntu-latest
    needs: js-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies + vsce
        run: |
          npm ci
          npm install -g @vscode/vsce

      - name: Build production bundle
        run: npm run build

      - name: Package VSIX
        id: package
        run: |
          vsce package --no-git-tag-version --no-dependencies
          VSIX=$(ls *.vsix | head -1)
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"
          echo "Packaged: $VSIX"

      - name: Assert VSIX size < 10MB
        run: |
          VSIX="${{ steps.package.outputs.vsix }}"
          SIZE_KB=$(du -k "$VSIX" | cut -f1)
          echo "VSIX: $VSIX — ${SIZE_KB}KB (limit: 10240KB)"
          if [ "$SIZE_KB" -gt 10240 ]; then
            echo "❌ VSIX exceeds 10MB: ${SIZE_KB}KB"
            exit 1
          fi
          echo "✅ Size OK: ${SIZE_KB}KB"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pruvagraph-vsix-ci
          path: "*.vsix"
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # JOB 5 — PyPI build check (wheel + sdist)
  # ──────────────────────────────────────────────────────────────────
  pypi-build:
    name: PyPI — Build Wheel + SDist
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheel and sdist
        working-directory: python
        run: |
          pip install build
          python -m build
          ls -lh dist/

      - name: Verify wheel installs cleanly
        working-directory: python
        run: |
          pip install dist/*.whl
          python -c "import pruvagraph; print('pruvagraph imported OK')"
          pruvagraph --help | head -3

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pruvagraph-dist
          path: python/dist/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # JOB 6 — Security audit (npm + pip)
  # ──────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: npm audit (zero high/critical)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (zero high CVEs)
        working-directory: python
        run: |
          pip install -e ".[dev]"
          pip-audit --skip-editable || true   # informational only until PyPI published

  # ──────────────────────────────────────────────────────────────────
  # FINAL — All gates must pass
  # ──────────────────────────────────────────────────────────────────
  all-green:
    name: ✅ All Gates Passed
    runs-on: ubuntu-latest
    needs: [js-tests, python-tests, benchmark-sanity, vsix-check, pypi-build, security]
    steps:
      - name: Summary
        run: |
          echo "================================================="
          echo "✅ JS Lint       — node --check (9 files)"
          echo "✅ JS Types      — tsc --noEmit (0 errors)"
          echo "✅ JS Tests      — 38 tests (8 DriftGuard + 30 Dashboard)"
          echo "✅ JS Coverage   — nyc report uploaded"
          echo "✅ Python Tests  — 460 tests (py3.11 + py3.12)"
          echo "✅ Benchmark     — tier_unknown=0%, savings ≥50%"
          echo "✅ VSIX          — packaged, size <10MB"
          echo "✅ PyPI Build    — wheel + sdist clean"
          echo "✅ Security      — npm audit + pip-audit"
          echo "================================================="
          echo "Safe to merge."

