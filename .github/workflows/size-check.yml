name: Size Check — VSIX Budget

on:
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20.x"
  SIZE_LIMIT_KB: 10240   # 10MB hard limit

jobs:
  size-check:
    name: VSIX Size Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies + vsce
        run: |
          npm ci
          npm install -g @vscode/vsce

      - name: Package VSIX
        run: vsce package --no-git-tag-version --no-dependencies

      - name: Measure and assert VSIX size
        id: measure
        run: |
          VSIX_FILE=$(ls *.vsix | head -1)
          SIZE_KB=$(du -k "$VSIX_FILE" | cut -f1)
          SIZE_MB=$(node -e "console.log(($SIZE_KB / 1024).toFixed(2))")

          echo "vsix_file=$VSIX_FILE"   >> "$GITHUB_OUTPUT"
          echo "size_kb=$SIZE_KB"        >> "$GITHUB_OUTPUT"
          echo "size_mb=${SIZE_MB}MB"    >> "$GITHUB_OUTPUT"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  VSIX Size Report"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  File    : $VSIX_FILE"
          echo "  Size    : ${SIZE_KB}KB (${SIZE_MB}MB)"
          echo "  Budget  : ${SIZE_LIMIT_KB}KB (10MB)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$SIZE_KB" -gt "$SIZE_LIMIT_KB" ]; then
            OVER=$((SIZE_KB - SIZE_LIMIT_KB))
            echo ""
            echo "❌ VSIX exceeds budget by ${OVER}KB"
            echo ""
            echo "Common causes:"
            echo "  - node_modules not excluded via .vscodeignore"
            echo "  - python/.venv accidentally packaged"
            echo "  - Large binary assets not excluded"
            exit 1
          fi

          REMAINING=$((SIZE_LIMIT_KB - SIZE_KB))
          echo "  Remaining budget: ${REMAINING}KB"
          echo ""
          echo "✅ Size check passed."

      - name: Post size comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const sizeKb = parseInt('${{ steps.measure.outputs.size_kb }}');
            const sizeMb = '${{ steps.measure.outputs.size_mb }}';
            const budget = 10240;
            const passed = sizeKb <= budget;
            const emoji  = passed ? '✅' : '❌';
            const status = passed ? 'within budget' : '**OVER BUDGET**';

            const body = [
              `## ${emoji} VSIX Size Check — ${status}`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| **VSIX size** | ${sizeKb}KB (${sizeMb}) |`,
              `| **Budget** | ${budget}KB (10MB) |`,
              `| **Remaining** | ${budget - sizeKb}KB |`,
              `| **Status** | ${emoji} ${status} |`,
              '',
              passed ? '' : '> ⚠️ **This PR increases VSIX beyond the 10MB budget. Reduce bundle size before merging.**',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
